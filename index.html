<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Keep</title>
    <!-- FAVICON -->
    <link rel="icon" href="https://www.gstatic.com/images/branding/product/1x/keep_2020q4_32dp.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

</head>
<body> 

    <header class="top-bar">

        <section class="left">
            <span class="material-symbols-outlined icons">
              menu
            </span>

            <img class="logo" src="assets/logo_keep_2026_color_2x_web_48dp.png" alt="Google Keep Logo">

            <h1>Keep</h1>


            <span class="material-symbols-outlined" id="search-icon">
              search
            </span>

            <input type="search"  id="search-bar" placeholder="Search"/>
        </section>

        <section class="right">
            <span class="material-symbols-outlined">
              refresh
            </span>

            <span class="material-symbols-outlined">
              view_agenda
            </span>

            <span class="material-symbols-outlined">
              settings
            </span>

            <span class="material-symbols-outlined">
              apps
            </span>

            <span class="material-symbols-outlined">
              account_circle
            </span>
        </section>

    </header>

    <aside>
        <div class="side-buttons">
            <span class="material-symbols-outlined">
                lightbulb_2
            </span>

            Notes
        </div>

        <div class="side-buttons">
            <span class="material-symbols-outlined">
                notifications
            </span>

            Reminder
        </div>

        <div class="side-buttons">
            <span class="material-symbols-outlined">
                label
            </span>

            Other
        </div>

        <div class="side-buttons">
            <span class="material-symbols-outlined">
                label
            </span>

            Personal
        </div>

        <div class="side-buttons">
            <span class="material-symbols-outlined">
                label
            </span>

            Work
        </div>

        <div class="side-buttons">
            <span class="material-symbols-outlined">
                edit
            </span>

            Edit labels
        </div>

        <div class="side-buttons">
            <span class="material-symbols-outlined">
                archive
            </span>

            Archive
        </div>

        <div class="side-buttons">
            <span class="material-symbols-outlined">
                delete
            </span>

            bin
        </div>

    </aside>

    <main>

        <section id="user-input">
            <!-- 1. COLLAPSED STATE -->
            <input type="text" id="collapsed-input" placeholder="Take a note...">

            <!-- 2. EXPANDED STATE - hidden by CSS -->
            <div id="expanded-input">
                <input type="text" id="title" placeholder="Title">
                <textarea id="note" placeholder="Take a note..."></textarea>
                <button id="closeBtn">Close</button>
            </div>

        </section>

        <section id="note-list"></section>

    </main>
    <script src="script.js"></script>
</body>
</html>
